<!DOCTYPE html>
<html>
<head>
    <title>Tarazo Backend Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a5276; }
        .test-card { background: white; border-radius: 10px; padding: 20px; margin: 15px 0; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="color: white;">🧪 Tarazo Backend Test</h1>

        <div class="test-card">
            <h3>Test Login with .env Credentials</h3>
            
            <div>
                <input type="email" id="email" placeholder="Email" value="admin@tarazo.com">
                <input type="password" id="password" placeholder="Password" value="admin123">
                <button onclick="testLogin()">Test Login</button>
            </div>
            
            <div id="loginResult" style="margin-top: 10px;"></div>
        </div>

        <div class="test-card">
            <h3>Test Register New User</h3>
            <div>
                <input type="text" id="regName" placeholder="Name" value="Test User">
                <input type="email" id="regEmail" placeholder="Email" value="testuser@example.com">
                <input type="tel" id="regPhone" placeholder="Phone" value="0771234567">
                <input type="password" id="regPassword" placeholder="Password" value="test123">
                <button onclick="testRegister()">Test Register</button>
            </div>
            <div id="registerResult" style="margin-top: 10px;"></div>
        </div>

        <div class="test-card">
            <h3>Test Protected Routes (After Login)</h3>
            <button onclick="testProducts()">1. Get Products</button>
            <button onclick="testCart()">2. Get Cart</button>
            <button onclick="testOrders()">3. Get Orders</button>
            <button onclick="testAdminStats()">4. Admin Stats (admin only)</button>
            <div id="protectedResult" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://raven-terazzo.onrender.com/api';
        let csrfToken = null;
        let currentUser = null;

        function showResult(elementId, success, message, data = null) {
            const el = document.getElementById(elementId);
            el.innerHTML = `
                <div class="${success ? 'success' : 'error'}">
                    ${success ? '✅' : '❌'} ${message}
                </div>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
        }

        async function getCSRFToken() {
            try {
                const response = await fetch(`${API_BASE}/csrf-token`, {
                    method: 'GET',
                    credentials: 'include'
                });
                const data = await response.json();
                csrfToken = data.csrf_token;
                console.log('CSRF Token:', csrfToken);
                return csrfToken;
            } catch (error) {
                console.error('CSRF error:', error);
                return null;
            }
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            showResult('loginResult', false, 'Logging in...');

            try {
                await getCSRFToken();
                
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentUser = data.user;
                    showResult('loginResult', true, 
                        `Login successful! Welcome ${currentUser.name} (Role: ${currentUser.role})`, 
                        data
                    );
                } else {
                    showResult('loginResult', false, `Login failed: ${data.error || 'Unknown error'}`, data);
                }
            } catch (error) {
                showResult('loginResult', false, `Login error: ${error.message}`);
            }
        }

        async function testRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;

            showResult('registerResult', false, 'Creating account...');

            try {
                await getCSRFToken();
                
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult('registerResult', true, 'Registration successful! You can now login.', data);
                } else {
                    showResult('registerResult', false, `Registration failed: ${data.error || 'Unknown error'}`, data);
                }
            } catch (error) {
                showResult('registerResult', false, `Registration error: ${error.message}`);
            }
        }

        async function testProducts() {
            showResult('protectedResult', false, 'Fetching products...');
            
            try {
                const response = await fetch(`${API_BASE}/products`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('protectedResult', true, `Products loaded: ${data.length} products`, data);
                } else {
                    showResult('protectedResult', false, `Failed: ${data.error || 'Unknown error'}`, data);
                }
            } catch (error) {
                showResult('protectedResult', false, `Error: ${error.message}`);
            }
        }

        async function testCart() {
            if (!currentUser) {
                showResult('protectedResult', false, 'Please login first to test cart');
                return;
            }
            
            showResult('protectedResult', false, 'Fetching cart...');
            
            try {
                const response = await fetch(`${API_BASE}/cart`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('protectedResult', true, `Cart loaded: ${data.length} items`, data);
                } else {
                    showResult('protectedResult', false, `Failed: ${data.error || 'Unauthorized - please login'}`, data);
                }
            } catch (error) {
                showResult('protectedResult', false, `Error: ${error.message}`);
            }
        }

        async function testOrders() {
            if (!currentUser) {
                showResult('protectedResult', false, 'Please login first to test orders');
                return;
            }
            
            showResult('protectedResult', false, 'Fetching orders...');
            
            try {
                const response = await fetch(`${API_BASE}/orders`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('protectedResult', true, `Orders loaded: ${data.length} orders`, data);
                } else {
                    showResult('protectedResult', false, `Failed: ${data.error || 'Unauthorized - please login'}`, data);
                }
            } catch (error) {
                showResult('protectedResult', false, `Error: ${error.message}`);
            }
        }

        async function testAdminStats() {
            if (!currentUser) {
                showResult('protectedResult', false, 'Please login first to test admin stats');
                return;
            }
            
            if (currentUser.role !== 'admin') {
                showResult('protectedResult', false, `You are logged in as ${currentUser.role}. Admin stats require admin role.`);
                return;
            }
            
            showResult('protectedResult', false, 'Fetching admin stats...');
            
            try {
                const response = await fetch(`${API_BASE}/admin/stats`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('protectedResult', true, 'Admin stats loaded', data);
                } else {
                    showResult('protectedResult', false, `Failed: ${data.error || 'Unauthorized'}`, data);
                }
            } catch (error) {
                showResult('protectedResult', false, `Error: ${error.message}`);
            }
        }
    </script>
</body>
</html>
